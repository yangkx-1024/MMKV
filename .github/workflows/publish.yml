name: Publish Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: "Optional explicit version (e.g. 1.2.3 or v1.2.3)"
        required: false
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release_and_swift:
    runs-on: macos-latest
    outputs:
      new_tag: ${{ steps.prepare.outputs.new_tag }}
    steps:
      - uses: swift-actions/setup-swift@v3
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Determine version and changelog
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1 || true)"
          if [ -n "$latest_tag" ]; then
            base="${latest_tag#v}"
            range="${latest_tag}..HEAD"
          else
            base="0.0.0"
            range="HEAD"
          fi

          if [ -n "$latest_tag" ]; then
            commit_count="$(git rev-list --count "$range")"
            if [ "$commit_count" -eq 0 ]; then
              echo "No commits since last tag: $latest_tag"
              exit 1
            fi
          fi

          if [ -n "${{ inputs.version }}" ]; then
            explicit="${{ inputs.version }}"
            explicit="${explicit#v}"
            if [[ ! "$explicit" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid explicit version: $explicit"
              exit 1
            fi
            next="$explicit"
          else
            IFS='.' read -r major minor patch <<< "$base"
            case "${{ inputs.bump }}" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "Unsupported bump type: ${{ inputs.bump }}"
                exit 1
                ;;
            esac
            next="${major}.${minor}.${patch}"
          fi

          new_tag="v${next}"
          if git rev-parse "$new_tag" >/dev/null 2>&1; then
            echo "Tag already exists: $new_tag"
            exit 1
          fi

          changelog_file="release-notes.md"
          {
            echo "## Changes"
            echo
            if [ -n "$latest_tag" ]; then
              git log "$range" --pretty=format:'- %s (%h)'
            else
              git log --pretty=format:'- %s (%h)'
            fi
          } > "$changelog_file"

          if ! grep -q '^-' "$changelog_file"; then
            {
              echo "## Changes"
              echo
              echo "- No user-facing changes."
            } > "$changelog_file"
          fi

          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "notes_file=$changelog_file" >> "$GITHUB_OUTPUT"

      - name: Install Rust Apple targets
        run: |
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios aarch64-apple-darwin x86_64-apple-darwin

      - name: Build xcframework
        run: ./build_apple.sh

      - name: Compute checksum
        id: checksum
        run: |
          echo "value=$(swift package compute-checksum ios/MMKV/RustMMKV.xcframework.zip)" >> "$GITHUB_OUTPUT"

      - name: Patch release version files
        run: |
          tag='${{ steps.prepare.outputs.new_tag }}'
          version="${tag#v}"
          checksum='${{ steps.checksum.outputs.value }}'
          url="https://github.com/${{ github.repository }}/releases/download/${tag}/RustMMKV.xcframework.zip"
          replacement=".binaryTarget(name: \"RustMMKV\", url: \"${url}\", checksum: \"${checksum}\")"
          REPLACEMENT="$replacement" perl -0777 -i -pe 's/\.binaryTarget\(name: "RustMMKV".*?\)/$ENV{REPLACEMENT}/gs' Package.swift
          sed -i.bak -E "s/^const val version = \".*\"$/const val version = \"${version}\"/" android/buildSrc/src/main/java/Version.kt
          rm -f android/buildSrc/src/main/java/Version.kt.bak

      - name: Commit and push release version files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift android/buildSrc/src/main/java/Version.kt
          if git diff --cached --quiet; then
            echo "No release version file changes to commit"
          else
            git commit -m "chore: prepare release files for ${{ steps.prepare.outputs.new_tag }}"
            git push origin main
          fi

      - name: Create and push tag
        run: |
          git tag -a "${{ steps.prepare.outputs.new_tag }}" -m "Release ${{ steps.prepare.outputs.new_tag }}"
          git push origin "${{ steps.prepare.outputs.new_tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "${{ steps.prepare.outputs.new_tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.prepare.outputs.new_tag }}" \
            --notes-file "${{ steps.prepare.outputs.notes_file }}" \
            $prerelease_flag

      - name: Upload xcframework to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.prepare.outputs.new_tag }}" ios/MMKV/RustMMKV.xcframework.zip --clobber --repo "${{ github.repository }}"

  rust_publish:
    name: Publish Rust crate
    runs-on: ubuntu-latest
    needs: release_and_swift
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - name: Cargo publish
        run: cargo publish --token ${CARGO_REGISTRY_TOKEN}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  android_publish:
    name: Publish Android package
    runs-on: ubuntu-latest
    needs: release_and_swift
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE }}
          GPG_SECRET: ${{ secrets.GPG_SECRET }}
        run: |
          echo ${ENCODED_KEYSTORE} | base64 -d > ./android/app/keystore.jks
          echo ${GPG_SECRET} | base64 -d | gpg --dearmor > ./android/secret.gpg

      - name: Install Rust targets for Android
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Build Rust .so files
        run: ./build_android.sh
        env:
          ANDROID_NDK_TOOLCHAINS_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin

      - name: Android publish
        env:
          SIGN_KEY_STORE_PATH: keystore.jks
          SIGN_STORE_PASSWORD: ${{ secrets.SIGN_STORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}
          SONATYPEUSERNAME: ${{ secrets.SONATYPEUSERNAME }}
          SONATYPEPASSWORD: ${{ secrets.SONATYPEPASSWORD }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PWD: ${{ secrets.GPG_PWD }}
        run: |
          cd ./android
          echo SIGN_KEY_STORE_PATH=keystore.jks >> local.properties
          echo SIGN_STORE_PASSWORD=${SIGN_STORE_PASSWORD} >> local.properties
          echo SIGN_KEY_ALIAS=${SIGN_KEY_ALIAS} >> local.properties
          echo SIGN_KEY_PASSWORD=${SIGN_KEY_PASSWORD} >> local.properties
          echo sonatypeUsername=${SONATYPEUSERNAME} >> local.properties
          echo sonatypePassword=${SONATYPEPASSWORD} >> local.properties
          echo signing.keyId=${GPG_KEY_ID} >> local.properties
          echo signing.password=${GPG_PWD} >> local.properties
          echo signing.secretKeyRingFile=../secret.gpg >> local.properties
          chmod +x gradlew
          ./gradlew clean
          ./gradlew publish
