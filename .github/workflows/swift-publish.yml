name: Publish Swift package

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: swift-actions/setup-swift@v3
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Install Rust Apple targets
        run: |
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios aarch64-apple-darwin x86_64-apple-darwin

      - name: Build xcframework
        run: ./build_apple.sh

      - name: Upload xcframework to release
        run: |
          gh release upload ${{ github.event.release.tag_name }} ios/MMKV/RustMMKV.xcframework.zip --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compute checksum
        id: checksum
        run: |
          echo "value=$(swift package compute-checksum ios/MMKV/RustMMKV.xcframework.zip)" >> "$GITHUB_OUTPUT"

      - name: Patch Package.swift
        run: |
          python3 -c "
import re
tag = '${{ github.event.release.tag_name }}'
checksum = '${{ steps.checksum.outputs.value }}'
url = f'https://github.com/${{ github.repository }}/releases/download/{tag}/RustMMKV.xcframework.zip'
replacement = f'.binaryTarget(name: \"RustMMKV\", url: \"{url}\", checksum: \"{checksum}\")'
c = open('Package.swift').read()
c = re.sub(r'\.binaryTarget\(name: \"RustMMKV\".*?\)', replacement, c, flags=re.DOTALL)
open('Package.swift', 'w').write(c)
"

      - name: Commit and push Package.swift
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "chore: update RustMMKV binary target to ${{ github.event.release.tag_name }}"
          git push origin main

      - name: Move release tag to new commit
        run: |
          git tag -f ${{ github.event.release.tag_name }} HEAD
          git push --force origin ${{ github.event.release.tag_name }}
