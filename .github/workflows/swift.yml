name: Swift Test

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'ios/**'
      - 'Package.swift'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'ios/**'
      - 'Package.swift'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: macos-latest

    steps:
      - uses: swift-actions/setup-swift@v3
      - uses: actions/checkout@v6
      - name: Build
        run: |
          ./build_apple.sh
          cd ios/MMKV
          swift build
      - name: Run tests
        run: |
          cd ios/MMKV
          swift test